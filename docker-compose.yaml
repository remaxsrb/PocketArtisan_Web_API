services:
  app:
    container_name: pocket_artisan
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - ./uploads:/app/uploads:Z  
      - ./assets:/app/assets:Z
      - ./internal/modules/files/generate_pdf/fonts:/app/fonts:Z
    restart: unless-stopped

  # Applies versioned Atlas migrations before the app starts. Runs once and
  # exits; the app waits for it via `service_completed_successfully`. Safe with
  # multiple app replicas because only this one-shot job touches the schema.
  migrate:
    image: arigaio/atlas:latest
    container_name: pocket_artisan_migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    command: >-
      migrate apply
      --dir file:///migrations
      --url "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    volumes:
      - ./migrations:/migrations:ro
    restart: "no"

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10


  redis:
    image: redis:7
    container_name: redis_cache
    restart: always
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7
    container_name: mongo_db
    restart: always
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  redis_data:
  mongo_data:
