services:
  app:
    container_name: pocket_artisan
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    # The database is Neon (managed Postgres). The app connects directly via the
    # POSTGRES_* vars in .env. On development, the `migrate` one-shot below
    # applies pending migrations to the dev Neon branch first (so minor changes
    # ship without a PR); on production, migrations are applied by CI/CD
    # (.github/workflows/db-deploy.yml on push to master).
    depends_on:
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - ./uploads:/app/uploads:Z  
      - ./assets:/app/assets:Z
      - ./internal/modules/files/generate_pdf/fonts:/app/fonts:Z
    restart: unless-stopped

  # Applies pending Atlas migrations to the dev Neon branch, then exits. This
  # lets development iterate without opening a PR. It is idempotent — a no-op
  # when the branch is already at the latest version.
  #
  # DATABASE_URL must be the DIRECT (non-pooled, no `-pooler` in host) dev Neon
  # connection string in .env, e.g.
  #   DATABASE_URL=postgres://USER:PASS@ep-xxxx.REGION.aws.neon.tech/DB?sslmode=require
  # We append search_path=public so Atlas keeps its atlas_schema_revisions
  # bookkeeping in the public schema (Neon otherwise fails with 42P01). This
  # mirrors the `deploy` env in atlas.hcl.
  migrate:
    image: arigaio/atlas:latest
    container_name: pocket_artisan_migrate
    command: >-
      migrate apply
      --dir file:///migrations
      --url "${DATABASE_URL}&search_path=public"
    volumes:
      - ./migrations:/migrations:ro
    restart: "no"

  redis:
    image: redis:7
    container_name: redis_cache
    restart: always
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data


  smtp4dev:
    image: rnwood/smtp4dev:v3
    container_name: smtp4dev
    restart: unless-stopped
    ports:
      - "2525:25"   # SMTP
      - "5000:80"   # web UI to inspect sent mail

  mongodb:
    image: mongo:7
    container_name: mongo_db
    restart: always
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  redis_data:
  mongo_data:
